name: Render deployment

on:
  push:
    branches:
      - main
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, closed]

jobs:
  render_deployment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger deployment
        run: |
          curl ${{ secrets.RENDER_DEPLOY_HOOK }}
